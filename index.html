<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMUNAH - Igreja</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100vh;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation: fadeOut 1s ease 2s forwards;
}

#intro img{
  width:220px;
  max-width:80%;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,215,0,0.5);
}

@keyframes fadeOut{
  to{
    opacity:0;
    visibility:hidden;
  }
}

/* SITE */
#site{
  padding:40px 15px;
  animation: fadeIn 1.5s ease-in-out;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

h1{
  color:gold;
  margin-bottom:35px;
  font-size:32px;
  letter-spacing:2px;
}

/* CARDS PROFISSIONAIS */
.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  margin:15px auto;
  padding:18px;
  border-radius:15px;
  max-width:500px;
  font-size:16px;
  box-shadow:0 8px 25px rgba(0,0,0,0.6);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 15px 35px rgba(255,215,0,0.2);
}

/* BOTÃO VER FOTO */
.btn-ver{
  margin-top:12px;
  padding:10px 18px;
  background:gold;
  color:#000;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.btn-ver:hover{
  transform:scale(1.05);
}

/* FOTO QUINTA */
#fotoQuinta{
  display:none;
  margin:20px auto;
  max-width:380px;
  width:100%;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.7);
}

/* FOTO FINAL */
.culto-img img{
  width:100%;
  max-width:500px;
  margin-top:35px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* BOTÃO WHATSAPP PROFISSIONAL */
.btn{
  display:inline-block;
  margin-top:40px;
  padding:16px 30px;
  background: linear-gradient(45deg,#25D366,#1ebe5d);
  color:white;
  text-decoration:none;
  border-radius:50px;
  font-weight:600;
  letter-spacing:1px;
  box-shadow:0 10px 25px rgba(37,211,102,0.4);
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.08);
  box-shadow:0 15px 35px rgba(37,211,102,0.6);
}

</style>
</head>

<body>

<!-- ÁUDIO -->
<audio id="audio" autoplay loop>
  <source src="louvor.mp3" type="audio/mpeg">
</audio>

<!-- INTRO -->
<div id="intro">
  <img src="IMG-20260319-WA0002.jpg" alt="EMUNAH">
</div>

<!-- SITE -->
<div id="site">
  <img src="IMG-20260319-WA0002.jpg">

<div class="card">Terça - Minha família no altar (20:00 Horas - BR)</div>
<div class="card">Quarta - Oração e ensaio (20:00 Horas - BR)</div>

<div class="card">
  Quinta - Culto de libertação (20:00 Horas - BR)
  <br>
  <button class="btn-ver" onclick="toggleFoto()">Ver Foto</button>
</div>

<img src="f05036ad02e941c8ac8a829997e7d606.jpg" id="fotoQuinta">

<div class="card">Sábado - Culto a cada 15 dias (16:00 Horas - BR)</div>
<div class="card">Domingo - Culto (19:00 Horas - BR)</div>

<div class="culto-img">
  <img src="4ec1e477225f43dbb3f68bb7ea975e37.jpg" alt="Igreja EMUNAH">
</div>

<a class="btn"
href="https://wa.me/556496078723?text=Irei%20comparecer%20ao%20culto!"
target="_blank">
Confirmar Presença
</a>

</div>

<script>

// Mostrar foto quinta
function toggleFoto(){
  const foto=document.getElementById("fotoQuinta");
  foto.style.display = foto.style.display === "block" ? "none" : "block";
}

// Áudio
function playAudio(){
  const audio=document.getElementById("audio");
  audio.play().catch(()=>{});
}
window.addEventListener("load",playAudio);
document.addEventListener("click",playAudio,{once:true});

</script>

</body>
</html>
