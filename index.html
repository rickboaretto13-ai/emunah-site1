<!DOCTYPE html>
<html lang="pt-BR">
<head>

.overlay {

h1 {

  width: 90%;

  margin-top: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px black;
}

.btn {
  margin-top: 20px;
  padding: 15px 25px;
  background: #25D366;
  color: white;
  border-radius: 10px;
  text-decoration: none;
  display: inline-block;
  font-weight: bold;

</a>

<!-- 🎵 MÚSICA LOCAL -->
<audio id="audio" autoplay loop>
  <source src="louvor.m4a" type="audio/mp4">
</audio>

<script>
window.addEventListener("load", () => {
  const audio = document.getElementById("audio");

  const playPromise = audio.play();

  if (playPromise !== undefined) {
    playPromise.catch(() => {
      document.addEventListener("touchstart", () => {
        audio.play();
      }, { once: true });
    });
  }
});
</script>
