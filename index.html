<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMUNAH - Igreja</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}
  <style>
/* INTRO SIMPLES */
  
#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#intro img {
  width: 180px;
  border-radius: 10px;
}

/* CONTEÚDO */
#site {
  display: none;
  text-align: center;
  padding: 20px;
}

h1 {
  color: gold;
}

.card {
  background: #222;
  margin: 10px auto;
  padding: 15px;
  border-radius: 10px;
  max-width: 500px;
}

/* IMAGEM */
.culto-img {
  margin-top: 20px;
}

.culto-img img {
  width: 100%;
  max-width: 500px;
  border-radius: 15px;
}

/* BOTÃO */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 15px 25px;
  background: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- 🔊 ÁUDIO -->
<audio id="audio" autoplay loop>
  <source src="louvor.mp3" type="audio/mpeg">
</audio>

<!-- 🎬 INTRO -->
<div id="intro">
  <img src="IMG-20260319-WA0002.jpg" alt="EMUNAH">
</div>

<!-- 🌍 SITE -->
<div id="site">

<h1>IGREJA EMUNAH</h1>

<div class="card">Terça - Minha família no altar (20:00 Horas - BR)</div>
<div class="card">Quarta - Oração e ensaio (20:00 Horas - BR)</div>
<div class="card">Quinta - Culto de libertação (20:00 Horas - BR)</div>
<img src="f05036ad02e941c8ac8a829997e7d606.jpg" class="foto-quinta">
  <style>
.foto-quinta {
    width: 100%;        /* ocupa todo o espaço do card */
    max-width: 350px;   /* tamanho máximo ideal */
    height: auto;       /* mantém proporção */
    display: block;
    margin: 10px auto 20px auto;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
  </style>
  
<div class="card">Sábado - Culto a cada 15 dias (16:00 Horas - BR)</div>
<div class="card">Domingo - Culto (19:00 Horas - BR)</div>

<!-- 🖼️ FOTO ABAIXO DOS CULTOS -->
<div class="culto-img">
  <video controls width="100%">
    <source src="VID-20260403-WA0009.mp4" type="video/mp4">
    Seu navegador não suporta vídeo.
  </video>
  </style>

</style>
</div>
<!-- 📲 WHATSAPP -->
<a class="btn" 
href="https://wa.me/556496078723?text=Irei%20comparecer%20ao%20culto!" 
target="_blank">
Confirmar Presença
</a>

</div>

<!-- ⚙️ SCRIPT -->
<script>

// sair da intro
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("site").style.display = "block";
}, 2000);

// áudio (fallback)
function playAudio() {
  const audio = document.getElementById("audio");
  audio.play().catch(()=>{});
}

window.addEventListener("load", playAudio);
document.addEventListener("click", playAudio, { once: true });

</script>

</body>
</html>
