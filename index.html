<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMUNAH</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('IMG-20260321-WA0007.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

.overlay {
  background: rgba(0,0,0,0.85);
  min-height: 100vh;
  text-align: center;
  padding: 20px;
}

h1 {
  color: gold;
  font-size: 40px;
  margin-top: 10px;
}

.card {
  background: rgba(255,255,255,0.1);
  margin: 10px auto;
  padding: 15px;
  border-radius: 15px;
  max-width: 500px;
  backdrop-filter: blur(10px);
}

/* FOTO */
.img-box {
  margin-top: 20px;
}

.img-box img {
  width: 90%;
  max-width: 500px;
  border-radius: 15px;
  box-shadow: 0 0 20px black;
}

/* BOTÃO */
.btn {
  margin-top: 20px;
  padding: 15px 25px;
  background: #25D366;
  border-radius: 10px;
  color: white;
  text-decoration: none;
  display: inline-block;
}

/* PLAYER */
#player {
  margin-top: 20px;
  display: none;
}
</style>
</head>

<body>

<div class="overlay">

<h1>IGREJA EMUNAH</h1>

<div class="card">Terça - Minha família no altar (20:00 BR)</div>
<div class="card">Quarta - Oração e ensaio (20:00 BR)</div>
<div class="card">Quinta - Culto de libertação (20:00 BR)</div>
<div class="card">Sábado - Culto (15 em 15 dias às 16:00 BR)</div>
<div class="card">Domingo - Culto (19:00 BR)</div>

<!-- FOTO EMBUTIDA -->
<div class="img-box">
  <img src="IMG-20260321-WA0007.jpg">
</div>

<!-- BOTÃO LOUVOR -->
<br>
<button class="btn" onclick="playMusic()">
🎵 Iniciar Louvor
</button>

<!-- WHATSAPP -->
<br>
<a class="btn" 
href="https://wa.me/556496078723?text=Irei%20comparecer%20ao%20culto!" 
target="_blank">
Confirmar Presença
</a>

<!-- MÚSICA AUTOMÁTICA GOD MODE -->
<iframe
  id="music"
  width="0"
  height="0"
  src="https://www.youtube.com/embed/cWA81k-7kp0?autoplay=1&loop=1&playlist=cWA81k-7kp0&mute=0"
  allow="autoplay">
</iframe>

<script>
function tryPlayMusic() {
  const iframe = document.getElementById("music");
  iframe.src = iframe.src; // força tentativa de reprodução
}

// tenta ao abrir
window.addEventListener("load", () => {
  tryPlayMusic();
});

// garante que toca no primeiro toque da tela (sem botão)
document.addEventListener("touchstart", () => {
  tryPlayMusic();
}, { once: true });
</script>

</body>
</html>
